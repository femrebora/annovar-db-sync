name: annovar-db-sync
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - perl                  # required for ANNOVAR scripts
  - pip:
      - requests>=2.28
      - urllib3>=2.0
      - certifi
      # development extras
      - pytest>=7.0
      - pytest-cov>=4.0
      - responses>=0.23
